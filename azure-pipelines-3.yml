trigger:
- main

variables:
  azureSubscription: 'YOUR_AZURE_SERVICE_CONNECTION_NAME'
  acrName: 'acrtaskappaqkhan'
  imageName: 'taskapp-backend'
  tag: '$(Build.BuildId)'
  dockerfilePath: '**/Dockerfile'

stages:

# ========================
# 🟢 BUILD & PUSH IMAGE
# ========================
- stage: Build
  displayName: Build and Push Docker Image
  jobs:
  - job: Build
    pool:
      vmImage: ubuntu-latest
    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build and Push Image to ACR
      inputs:
        command: buildAndPush
        repository: $(imageName)
        dockerfile: $(dockerfilePath)
        containerRegistry: 'YOUR_ACR_SERVICE_CONNECTION'
        tags: |
          $(tag)

# ========================
# 🟢 DEPLOY TO APP SERVICE
# ========================
- stage: Deploy
  displayName: Deploy to Azure Web App
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      vmImage: ubuntu-latest
    steps:

    - task: AzureWebAppContainer@1
      displayName: Deploy Container to App Service
      inputs:
        azureSubscription: 'Azure for Students'
        appName: 'app-taskapp-backend-aqkhan'
        containers: 'acrtaskappaqkhan.azurecr.io/taskapp-backend:$(tag)'